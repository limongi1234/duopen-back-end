name: Backend CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  testes:
    name: Testes (cobertura >= 80%)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Torch CPU-only: evita ~2GB de pacotes CUDA (nvidia-*) sem GPU no CI.
      # Instalado antes para satisfazer a dep do sentence-transformers sem puxar a build CUDA.
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check app/ tests/
      - name: Type-check (mypy)
        run: mypy app/
      - name: Testes + cobertura
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=80
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test

  deploy:
    name: Deploy Railway
    runs-on: ubuntu-latest
    needs: testes
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-github-action@v1
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
